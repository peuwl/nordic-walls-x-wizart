name: Build Nordic Walls x WizArt

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller pillow requests openpyxl

      - name: Build Python binary (PyInstaller)
        run: |
          python -m PyInstaller \
            --onefile \
            --name run_import \
            --distpath dist-python \
            --add-data "templates:templates" \
            python/run_import.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Nordic-Walls-x-WizArt-macOS
          path: dist/*.dmg

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller pillow requests openpyxl

      - name: Build Python binary (PyInstaller)
        run: |
          python -m PyInstaller `
            --onefile `
            --name run_import `
            --distpath dist-python `
            --add-data "templates;templates" `
            python/run_import.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Build Electron app (Windows)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Nordic-Walls-x-WizArt-Windows
          path: dist/*.exe

  # ── Publish public release ─────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" \) -exec cp {} release-files/ \;
          ls -la release-files

      - name: Publish "latest" rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Senaste byggda versionen av **Nordic Walls x WizArt**.

            - **macOS (Apple Silicon)**: Nordic Walls x WizArt-*-arm64.dmg
            - **macOS (Intel)**: Nordic Walls x WizArt-*.dmg
            - **Windows**: Nordic Walls x WizArt Setup *.exe

            Bygget uppdateras automatiskt vid varje commit till `main`.
          files: release-files/*
          prerelease: false
          make_latest: "true"
